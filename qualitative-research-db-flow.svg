<svg id="sv" width="100%" viewBox="0 0 900 730" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',sans-serif"><style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&amp;family=IBM+Plex+Sans:wght@300;400;500&amp;display=swap');</style><rect width="900" height="730" fill="#FAF6F0"/>
