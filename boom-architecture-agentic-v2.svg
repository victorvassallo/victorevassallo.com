<svg width="100%" viewBox="0 0 900 800" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans',sans-serif">
  <style>@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&amp;family=IBM+Plex+Sans:wght@300;400;500&amp;display=swap');</style>
  <rect width="900" height="800" fill="#FAF6F0"/>

  <defs>
    <marker id="m0" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#9C7A60" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="mt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#5A9A82" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="mb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#7A8FA8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#9C6B4E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="mfb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══ PHASE SIDEBAR LINES + LABELS ═══ -->

  <!-- INGESTION y=8..184 -->
  <line x1="30" y1="8" x2="30" y2="184" stroke="#D4B898" stroke-width="0.75"/>
  <text transform="rotate(-90,14,96)" x="14" y="96" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#B09878" letter-spacing=".12em" text-anchor="middle">INGESTION</text>

  <!-- NORMALIZE y=192..272 -->
  <line x1="30" y1="192" x2="30" y2="272" stroke="#D4B898" stroke-width="0.75"/>
  <text transform="rotate(-90,14,232)" x="14" y="232" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#B09878" letter-spacing=".12em" text-anchor="middle">NORMALIZE</text>

  <!-- SEMANTIC y=288..368 -->
  <line x1="30" y1="288" x2="30" y2="368" stroke="#D4B898" stroke-width="0.75"/>
  <text transform="rotate(-90,14,328)" x="14" y="328" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#B09878" letter-spacing=".12em" text-anchor="middle">SEMANTIC</text>

  <!-- SCORING y=384..504 -->
  <line x1="30" y1="384" x2="30" y2="504" stroke="#D4B898" stroke-width="0.75"/>
  <text transform="rotate(-90,14,444)" x="14" y="444" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#B09878" letter-spacing=".12em" text-anchor="middle">SCORING</text>

  <!-- DELIVERY y=520..752 -->
  <line x1="30" y1="520" x2="30" y2="752" stroke="#D4B898" stroke-width="0.75"/>
  <text transform="rotate(-90,14,636)" x="14" y="636" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#B09878" letter-spacing=".12em" text-anchor="middle">DELIVERY</text>

  <!-- ═══ HORIZONTAL DIVIDERS ═══ -->
  <line x1="36" y1="8"   x2="864" y2="8"   stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>
  <line x1="36" y1="184" x2="864" y2="184" stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>
  <line x1="36" y1="192" x2="864" y2="192" stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>
  <line x1="36" y1="272" x2="864" y2="272" stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>
  <line x1="36" y1="288" x2="864" y2="288" stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>
  <line x1="36" y1="368" x2="864" y2="368" stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>
  <line x1="36" y1="384" x2="864" y2="384" stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>
  <line x1="36" y1="504" x2="864" y2="504" stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>
  <line x1="36" y1="520" x2="864" y2="520" stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>
  <line x1="36" y1="752" x2="864" y2="752" stroke="#E0D0BC" stroke-width="0.5" stroke-dasharray="2 6"/>

  <!-- ═══ INGESTION CONTAINER ═══ -->
  <rect x="38" y="8" width="824" height="176" rx="6" fill="#FAF6F0" stroke="#C4A882" stroke-width="1"/>
  <text x="56" y="30" font-family="'IBM Plex Mono',monospace" font-size="9" font-weight="500" fill="#6B4535" letter-spacing=".08em" dominant-baseline="central">Continuous Source Monitoring</text>
  <text x="56" y="48" font-size="11" fill="#9C7A5A" dominant-baseline="central">Agent autonomously polls and ingests from procurement boards, grant portals, and agency feeds</text>

  <!-- 3 source boxes -->
  <rect x="85" y="68" width="234" height="100" rx="5" fill="#F5EFE6" stroke="#C4A882" stroke-width="0.75"/>
  <text x="202" y="108" font-size="13" font-weight="500" fill="#2E1F1F" text-anchor="middle" dominant-baseline="central">Contract &amp; Procurement</text>
  <text x="202" y="130" font-size="11" fill="#7A5C4A" text-anchor="middle" dominant-baseline="central">Federal boards &amp; agency solicitations</text>

  <rect x="333" y="68" width="234" height="100" rx="5" fill="#F5EFE6" stroke="#C4A882" stroke-width="0.75"/>
  <text x="450" y="108" font-size="13" font-weight="500" fill="#2E1F1F" text-anchor="middle" dominant-baseline="central">Grant Funding</text>
  <text x="450" y="130" font-size="11" fill="#7A5C4A" text-anchor="middle" dominant-baseline="central">Federal &amp; foundation grant portals</text>

  <rect x="581" y="68" width="234" height="100" rx="5" fill="#F5EFE6" stroke="#C4A882" stroke-width="0.75"/>
  <text x="698" y="108" font-size="13" font-weight="500" fill="#2E1F1F" text-anchor="middle" dominant-baseline="central">Agency Intelligence</text>
  <text x="698" y="130" font-size="11" fill="#7A5C4A" text-anchor="middle" dominant-baseline="central">Targeted feeds &amp; market pipelines</text>

  <!-- fan-in -->
  <line x1="202" y1="168" x2="450" y2="184" stroke="#C4A882" stroke-width="0.75" opacity="0.7"/>
  <line x1="450" y1="168" x2="450" y2="184" stroke="#C4A882" stroke-width="0.75" opacity="0.7"/>
  <line x1="698" y1="168" x2="450" y2="184" stroke="#C4A882" stroke-width="0.75" opacity="0.7"/>

  <!-- connector -->
  <line x1="450" y1="184" x2="450" y2="192" stroke="#9C7A60" stroke-width="1" marker-end="url(#m0)"/>

  <!-- ═══ NORMALIZATION ═══ -->
  <rect x="330" y="192" width="240" height="80" rx="5" fill="#EBF5F0" stroke="#7ABE9E" stroke-width="1"/>
  <text x="450" y="216" font-size="13" font-weight="500" fill="#1A4035" text-anchor="middle" dominant-baseline="central">Normalization &amp; Segmentation</text>
  <text x="450" y="236" font-size="11" fill="#3A7060" text-anchor="middle" dominant-baseline="central">Schema standardization, deduplication,</text>
  <text x="450" y="253" font-size="11" fill="#3A7060" text-anchor="middle" dominant-baseline="central">and semantic segmentation</text>

  <line x1="450" y1="272" x2="450" y2="288" stroke="#5A9A82" stroke-width="1" marker-end="url(#mt)"/>

  <!-- ═══ SEMANTIC LAYER ═══ -->
  <rect x="330" y="288" width="240" height="80" rx="5" fill="#EAE8F5" stroke="#8A88C8" stroke-width="1"/>
  <text x="450" y="312" font-size="13" font-weight="500" fill="#1A1850" text-anchor="middle" dominant-baseline="central">Domain Semantic Layer</text>
  <text x="450" y="332" font-size="11" fill="#4A4890" text-anchor="middle" dominant-baseline="central">Custom embeddings, vector search,</text>
  <text x="450" y="349" font-size="11" fill="#4A4890" text-anchor="middle" dominant-baseline="central">and context retrieval from internal IP</text>

  <line x1="450" y1="368" x2="450" y2="384" stroke="#7A78C0" stroke-width="1" marker-end="url(#mb)"/>

  <!-- ═══ SCORING CONTAINER ═══ -->
  <rect x="38" y="384" width="824" height="120" rx="6" fill="#FDF0E4" stroke="#D4956A" stroke-width="1.25"/>
  <text x="56" y="406" font-family="'IBM Plex Mono',monospace" font-size="9" font-weight="500" fill="#7A4010" letter-spacing=".08em" dominant-baseline="central">Proprietary Scoring Engine</text>
  <text x="56" y="424" font-size="11" fill="#A06030" dominant-baseline="central">Agent-driven evaluation using company IP — weighted scoring, adaptive decision rules, and outcome feedback</text>

  <rect x="80" y="438" width="362" height="54" rx="4" fill="#FAF6F0" stroke="#C4A882" stroke-width="0.75"/>
  <text x="261" y="456" font-size="12" font-weight="500" fill="#2E1F1F" text-anchor="middle" dominant-baseline="central">Opportunity Fit Assessment</text>
  <text x="261" y="476" font-size="11" fill="#7A5C4A" text-anchor="middle" dominant-baseline="central">Sector priorities · capability signals · strategic alignment</text>

  <rect x="458" y="438" width="362" height="54" rx="4" fill="#F8EED8" stroke="#C4906A" stroke-width="0.75"/>
  <text x="639" y="456" font-size="12" font-weight="500" fill="#2E1F1F" text-anchor="middle" dominant-baseline="central">Adaptive Intelligence</text>
  <text x="639" y="476" font-size="11" fill="#7A4A20" text-anchor="middle" dominant-baseline="central">Win/loss history · outcome feedback · IP compounding</text>

  <line x1="450" y1="504" x2="450" y2="520" stroke="#9C6B4E" stroke-width="1" marker-end="url(#ma)"/>

  <!-- ═══ RANKED OUTPUT ═══ -->
  <rect x="330" y="520" width="240" height="80" rx="5" fill="#EDE3D5" stroke="#9C6B4E" stroke-width="1"/>
  <text x="450" y="544" font-size="13" font-weight="500" fill="#2E1F1F" text-anchor="middle" dominant-baseline="central">Ranked Recommendations</text>
  <text x="450" y="564" font-size="11" fill="#6B4535" text-anchor="middle" dominant-baseline="central">Scored opportunities with structured</text>
  <text x="450" y="581" font-size="11" fill="#6B4535" text-anchor="middle" dominant-baseline="central">rationale traces, ready for action</text>

  <line x1="450" y1="600" x2="450" y2="616" stroke="#9C6B4E" stroke-width="1" marker-end="url(#ma)"/>

  <!-- ═══ AGENTIC ACTIONS CONTAINER ═══ -->
  <rect x="38" y="616" width="824" height="136" rx="6" fill="#FAF6F0" stroke="#9C6B4E" stroke-width="1"/>
  <text x="56" y="638" font-family="'IBM Plex Mono',monospace" font-size="9" font-weight="500" fill="#6B3520" letter-spacing=".08em" dominant-baseline="central">Autonomous Action Layer</text>
  <text x="56" y="656" font-size="11" fill="#9C6040" dominant-baseline="central">Agent conditionally triggers downstream actions based on score thresholds and opportunity state</text>

  <!-- 3 action boxes -->
  <rect x="80" y="668" width="220" height="68" rx="4" fill="#EDE3D5" stroke="#9C6B4E" stroke-width="0.75"/>
  <text x="190" y="694" font-size="12" font-weight="500" fill="#2E1F1F" text-anchor="middle" dominant-baseline="central">Route &amp; Prioritize</text>
  <text x="190" y="714" font-size="10.5" fill="#6B4535" text-anchor="middle" dominant-baseline="central">Teams notified with scored</text>
  <text x="190" y="727" font-size="10.5" fill="#6B4535" text-anchor="middle" dominant-baseline="central">opportunity packages</text>

  <rect x="340" y="668" width="220" height="68" rx="4" fill="#EBF5F0" stroke="#7ABE9E" stroke-width="0.75"/>
  <text x="450" y="694" font-size="12" font-weight="500" fill="#1A4035" text-anchor="middle" dominant-baseline="central">Summarize &amp; Analyze</text>
  <text x="450" y="714" font-size="10.5" fill="#3A7060" text-anchor="middle" dominant-baseline="central">Auto-generated summaries</text>
  <text x="450" y="727" font-size="10.5" fill="#3A7060" text-anchor="middle" dominant-baseline="central">and document analysis</text>

  <rect x="600" y="668" width="220" height="68" rx="4" fill="#F5EAF0" stroke="#A878A0" stroke-width="0.75"/>
  <text x="710" y="694" font-size="12" font-weight="500" fill="#2E1020" text-anchor="middle" dominant-baseline="central">Escalate to Analyst</text>
  <text x="710" y="714" font-size="10.5" fill="#6A3858" text-anchor="middle" dominant-baseline="central">Human review triggered for</text>
  <text x="710" y="727" font-size="10.5" fill="#6A3858" text-anchor="middle" dominant-baseline="central">high-stakes decisions</text>

  <!-- ═══ FEEDBACK LOOP ═══ -->
  <path d="M862,461 L882,461 L882,328 L570,328" fill="none" stroke="#C4A882" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#mfb)"/>
  <text transform="rotate(90,890,394)" x="890" y="394" font-family="'IBM Plex Mono',monospace" font-size="8" fill="#C4A882" text-anchor="middle" letter-spacing=".1em">FEEDBACK LOOP</text>

</svg>
